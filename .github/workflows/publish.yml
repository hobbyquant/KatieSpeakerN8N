# Publishes this n8n community node package to npm on every version tag push.
#
# n8n requires all community nodes submitted for verification (from May 1 2026)
# to be published via GitHub Actions with npm provenance statements. Provenance
# lets anyone cryptographically verify that a package was built by this exact
# workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# @n8n/node-cli >= 0.23.0 is required for the --provenance flag used by
# `npm run release` in CI.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com and open this package's settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: hobbyquant
#        Repository name:  KatieSpeakerN8N
#        Workflow name:    publish.yml
#        Environment:      (leave blank)
#   4. Leave NPM_TOKEN unset; GitHub's OIDC token is exchanged for npm auth.
#
# Option B — npm Automation Token (fallback):
#   1. On npmjs.com: Access Tokens → Generate New Token → Granular Access Token,
#      scoped to this package with "Read and write" publish permission.
#   2. In GitHub: Settings → Secrets and variables → Actions → New secret
#      named NPM_TOKEN.

name: Publish

on:
  push:
    tags:
      # This repo uses v-prefixed tags (e.g. v0.4.0).
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        # `n8n-node release` runs lint, build, then publishes with provenance.
        # Option A (OIDC): leave NPM_TOKEN unset — token step is skipped.
        # Option B (token): NPM_TOKEN is written to .npmrc before publishing.
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
